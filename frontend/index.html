<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lugama - Adivina la Canción</title>
    <link rel="stylesheet" href="./css/index.css">
</head>
<body>

    <!-- SECCIÓN DE AUTENTICACIÓN -->
    <div id="auth-section">
        <h1 id="auth-title">Login Lugama</h1>
        <input type="text" id="reg-username" placeholder="Nombre de usuario" style="display:none;">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="btn-main" onclick="handleLogin()">Entrar</button>
        <p id="toggle-text">¿No tenés cuenta? <a href="#" onclick="showRegister()">Registrate acá</a></p>
    </div>

    <!-- SECCIÓN DEL JUEGO -->
    <div id="game-section" style="display:none;">
        <div class="header-game">
            <h1>Lugama Game</h1>
            <div class="stats">
                <p>Usuario: <span id="user-name"></span></p>
                <p>Puntos: <span id="user-points">0</span></p>
                <p>Estrellas: <span id="user-stars">0</span></p>
                <p>Intento: <span id="attempt-count" class="time-badge">1 / 6</span></p>
            </div>
        </div>

        <div id="player-container">
            <p>Tiempo disponible: <span class="time-badge" id="current-limit-display">0.5s</span></p>
            <audio id="song-preview" controls controlsList="nodownload"></audio>
            <p id="feedback-message">¡Dale Play para empezar!</p>
        </div>

        <div class="guess-area">
            <input type="text" id="guess-input" list="songs-list" placeholder="¿Cómo se llama la canción?" oninput="handleSearch(this.value)">
            <datalist id="songs-list"></datalist>
            <button onclick="handleCheck()">Adivinar</button>
            <button onclick="loadNewSong()" id="next-btn" style="margin-left: 10px;">Saltar / Siguiente</button>
        </div>

        <div id="song-info" style="display:none; margin-top: 20px;">
            <h3>La canción era:</h3>
            <img id="album-cover" src="" alt="Album Cover" style="width: 200px; border-radius: 10px;">
            <p id="song-details" style="font-weight: bold; font-size: 1.2rem;"></p>
        </div>
    </div>

    <script src="./js/index.js"></script>
</body>
</html>
